<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจุ่มการ์ดคอมพิวเตอร์</title>
    <style>
        :root {
            --primary-color: #4a148c;
            --secondary-color: #ffb300;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Sarabun', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            overflow-x: hidden;
            box-sizing: border-box;
            background-color: #00076b;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(120, 30, 160, 0.2) 0%, rgba(10, 0, 20, 0.9) 80%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        }

        #magic-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .sparkle { position: absolute; background-color: var(--secondary-color); border-radius: 50%; opacity: 0; box-shadow: 0 0 10px 2px var(--secondary-color); animation: floatUp 4s ease-in infinite; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translateY(-10px) scale(1); opacity: 0; } }

        .mode-selector { display: flex; gap: 15px; margin-bottom: 30px; z-index: 10; }
        .btn-mode { padding: 10px 25px; font-size: 16px; font-weight: bold; background: rgba(255, 255, 255, 0.1); color: #fff; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 30px; cursor: pointer; transition: all 0.3s ease; }
        .btn-mode.active { background: linear-gradient(135deg, #ffb300, #ff8f00); color: #000; border-color: var(--secondary-color); box-shadow: 0 0 15px rgba(255, 179, 0, 0.5); }
        .btn-mode:hover:not(.active) { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.6); }

        .mode-container { display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ======================================================= */
        /* CSS โหมดที่ 1: ตู้กาชาปอง */
        /* ======================================================= */
        .gacha-machine {
            position: relative; z-index: 2; width: 380px; height: 560px;
            background: linear-gradient(180deg, #3a0ca3, #150050); border: 4px solid var(--secondary-color);
            border-radius: 40px 40px 20px 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(255, 179, 0, 0.2);
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; box-sizing: border-box;
        }
        .gacha-sign { background: linear-gradient(135deg, #150050, #4a148c); border: 2px solid var(--secondary-color); border-radius: 10px; padding: 6px 25px; font-size: 16px; font-weight: bold; color: var(--secondary-color); text-shadow: 0 0 8px rgba(255, 179, 0, 0.8); box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 5px rgba(255,179,0,0.2); margin-bottom: 15px; }
        
        .gacha-glass { 
            width: 330px; height: 250px; background: rgba(255, 255, 255, 0.08); 
            border: 3px solid rgba(255, 255, 255, 0.25); border-radius: 25px; 
            position: relative; overflow: hidden; box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.15); 
            display: flex; align-items: center; justify-content: flex-start; 
        }
        
        .gacha-carousel { display: flex; width: max-content; animation: scrollLeft 25s linear infinite; }
        .carousel-track { display: flex; gap: 20px; padding-right: 20px; }
        .carousel-card { width: 140px; height: 210px; background-color: #fff; background-size: cover; background-position: center; border: 3px solid rgba(255, 255, 255, 0.8); border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.7); flex-shrink: 0; }
        @keyframes scrollLeft { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }

        .control-wrapper { display: flex; gap: 10px; align-items: center; margin-top: 25px; z-index: 10; }
        .input-group { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 30px; border: 1px solid var(--secondary-color); display: flex; align-items: center; gap: 8px; }
        .input-group label { color: var(--secondary-color); font-weight: bold; font-size: 14px; }
        .input-group input { width: 40px; background: transparent; border: none; color: white; font-size: 16px; font-weight: bold; text-align: center; outline: none; }
        
        .btn-spin { padding: 12px 30px; font-size: 18px; background: linear-gradient(135deg, #ffb300, #ff8f00); color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(255, 179, 0, 0.4); transition: transform 0.2s; }
        .btn-spin:hover { transform: scale(1.05); } .btn-spin:active { transform: scale(0.95); }
        .btn-spin:disabled { filter: grayscale(1); cursor: not-allowed; transform: none; }

        .gacha-chute-container { margin-top: auto; margin-bottom: 25px; position: relative; width: 160px; height: 85px; background: #07001f; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 12px; box-shadow: inset 0 8px 15px rgba(0,0,0,0.9); overflow: hidden; }
        .gacha-slot { width: 100px; height: 6px; background: #000; margin: 0 auto; border-radius: 3px; margin-top: 5px; }
        .gacha-chute-lip { position: absolute; bottom: 0; left: 0; width: 100%; height: 32px; background: linear-gradient(180deg, #2b0052, #150050); border-top: 2px solid var(--secondary-color); border-radius: 0 0 10px 10px; z-index: 5; }
        .dropped-card { position: absolute; width: 65px; height: 95px; background-image: url('image/card-back.png'); background-size: cover; border-radius: 6px; left: 50%; top: -100px; transform: translateX(-50%); opacity: 0; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .anim-drop { animation: dropCard 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes dropCard { 0% { top: -100px; opacity: 0; transform: translateX(-50%) scale(0.7); } 40% { opacity: 1; } 100% { top: 12px; opacity: 1; transform: translateX(-50%) scale(1); } }

        /* ======================================================= */
        /* CSS โหมดที่ 2: จุ่มเลือกการ์ดเอง */
        /* ======================================================= */
        h2.manual-title { color: var(--secondary-color); text-align: center; text-shadow: 0 2px 10px rgba(255, 179, 0, 0.5); margin: 0 0 10px 0; }
        .mystery-cards { display: flex; gap: 20px; margin-top: 15px; perspective: 1200px; flex-wrap: wrap; justify-content: center; max-width: 850px; min-height: 290px; position: relative; z-index: 2; }
        .card-wrapper { position: relative; width: 160px; height: 250px; animation: breathing 4s ease-in-out infinite; }
        .card-wrapper:nth-child(odd) { animation-delay: 0s; } .card-wrapper:nth-child(even) { animation-delay: 1s; }
        @keyframes breathing { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }

        .tarot-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; cursor: pointer; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 15px 25px rgba(0,0,0,0.7), 0 5px 10px rgba(0,0,0,0.5); border-radius: 12px; }
        .tarot-card:hover { transform: translateY(-15px) scale(1.05); box-shadow: 0 25px 35px rgba(0,0,0,0.8), 0 0 15px rgba(255, 179, 0, 0.4); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 2px solid rgba(255, 255, 255, 0.8); display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #2b0052; }
        .card-front { background-image: url('image/card-back.png'); background-size: cover; background-position: center; }
        .card-back { background: #fff; transform: rotateY(180deg); } .card-back img { width: 100%; height: 100%; object-fit: cover; }
        .flipped { transform: rotateY(180deg) scale(1.1) !important; z-index: 10; box-shadow: 0 30px 40px rgba(0,0,0,0.8); }
        .disabled-card { opacity: 0.3; pointer-events: none; transition: opacity 0.5s; filter: grayscale(50%); }

        .btn-shuffle { margin-top: 30px; padding: 12px 35px; font-size: 18px; background: linear-gradient(135deg, #ffb300, #ff8f00); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 179, 0, 0.4); transition: transform 0.2s; z-index: 2; }
        .btn-shuffle:hover { transform: scale(1.05); }

        /* ======================================================= */
        /* CSS ปุ่ม Skip ข้ามอนิเมชัน */
        /* ======================================================= */
        .skip-checkbox-container {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(5, 0, 35, 0.85); padding: 10px 20px;
            border-radius: 30px; border: 2px solid var(--secondary-color);
            z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }
        .skip-checkbox-container label {
            display: flex; align-items: center; gap: 8px;
            color: var(--secondary-color); font-weight: bold;
            cursor: pointer; font-size: 15px; user-select: none;
        }
        .skip-checkbox-container input[type="checkbox"] {
            width: 18px; height: 18px; accent-color: var(--secondary-color); cursor: pointer;
        }

        /* ======================================================= */
        /* CSS Modal และ Effects */
        /* ======================================================= */
        .hidden { display: none !important; } .flex { display: flex !important; }
        #sequenceModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #modalBg { position: absolute; inset: 0; background-color: rgba(5, 0, 20, 0.9); backdrop-filter: blur(8px); }
        #impactFrame { position: absolute; inset: 0; pointer-events: none; z-index: 110; }
        #particlesContainer { position: absolute; inset: 0; pointer-events: none; z-index: 105; }
        
        #openingContainer { position: relative; flex-direction: column; align-items: center; justify-content: center; z-index: 108; width: 100%; height: 100%; }
        #boxAnimContainer { position: relative; width: 200px; height: 320px; }
        #boxAura { position: absolute; inset: 0; border-radius: 16px; filter: blur(25px); opacity: 0; transition: opacity 0.5s; }
        #animBoxImg { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 2px solid #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        
        #resultContainer { position: relative; z-index: 120; width: 100%; max-width: 950px; padding: 20px; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        #multipleResults { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; pointer-events: auto; }
        .result-card-item { width: 160px; height: 240px; animation: breatheCard 3.5s ease-in-out infinite; }
        .result-card-item img { width: 100%; height: 100%; object-fit: contain; border-radius: 16px; border: 2px solid rgba(255, 255, 255, 0.8); filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8)); }

        @keyframes breatheCard { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        #resultText { font-size: 32px; color: #fff; text-align: center; margin-top: 30px; margin-bottom: 30px; pointer-events: auto; text-shadow: 0 2px 10px var(--secondary-color), 0 4px 20px rgba(0,0,0,0.8); font-weight: bold; line-height: 1.4; }
        .modal-btn { background: linear-gradient(135deg, #ffb300, #ff8f00); color: #000; font-size: 22px; padding: 12px 40px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; pointer-events: auto; box-shadow: 0 4px 15px rgba(255, 179, 0, 0.5); transition: transform 0.2s; }
        .modal-btn:hover { transform: scale(1.05); }

        @keyframes dramatic-shake { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 10%, 30%, 50%, 70%, 90% { transform: translate(-4px, -4px) rotate(-2deg); } 20%, 40%, 60%, 80% { transform: translate(4px, 4px) rotate(2deg); } }
        .anim-shake { animation: dramatic-shake 1.5s cubic-bezier(.36,.07,.19,.97) forwards; }
        @keyframes impact-flash { 0%, 100% { opacity: 0; background: white; mix-blend-mode: normal; } 10%, 30% { opacity: 1; background: white; mix-blend-mode: difference; } 20%, 40% { opacity: 1; background: black; mix-blend-mode: normal; } }
        .anim-impact { animation: impact-flash 0.5s ease-out; }
        @keyframes aura-pulse { 0% { box-shadow: 0 0 0 0 var(--aura-color); } 100% { box-shadow: 0 0 50px 20px var(--aura-color); opacity: 0; } }
        .particle-explosion { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
        .particle-line { position: absolute; background: white; height: 3px; transform-origin: left center; pointer-events: none; }
        @keyframes burst { 0% { transform: scale(0) rotate(-20deg); opacity: 0; filter: brightness(2); } 60% { transform: scale(1.1) rotate(5deg); opacity: 1; filter: brightness(1.5); } 100% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); } }
        .anim-burst { animation: burst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>

    <div id="magic-particles"></div>

    <div class="skip-checkbox-container">
        <label>
            <input type="checkbox" id="skip-animate-check"> ⚡ ข้ามอนิเมชัน
        </label>
    </div>

    <div class="mode-selector">
        <button class="btn-mode active" id="mode-gacha-btn" onclick="switchMode('gacha')">🎰 โหมดตู้กาชาปอง</button>
        <button class="btn-mode" id="mode-manual-btn" onclick="switchMode('manual')">🔮 โหมดเลือกการ์ดเอง</button>
    </div>

    <div id="gacha-mode-container" class="mode-container">
        <div class="gacha-machine" id="gacha-machine">
            <div class="gacha-sign">จุ่มการ์ดโชคชะตา</div>
            <div class="gacha-glass">
                <div class="gacha-carousel">
                    <div class="carousel-track">
                        <div class="carousel-card" style="background-image: url('image/reward.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/50.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/nothing.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/sweet.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/100.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/pen.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/150.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/poppy.png');"></div>
                    </div>
                    <div class="carousel-track">
                        <div class="carousel-card" style="background-image: url('image/reward.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/50.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/nothing.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/sweet.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/100.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/pen.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/150.png');"></div>
                        <div class="carousel-card" style="background-image: url('image/poppy.png');"></div>
                    </div>
                </div>
            </div>
            
            <div class="control-wrapper">
                <div class="input-group">
                    <label>จำนวน:</label>
                    <input type="number" id="draw-count" min="1" max="5" value="1" onchange="if(this.value<1)this.value=1;if(this.value>5)this.value=5;">
                </div>
                <button class="btn-spin" id="spin-btn" onclick="spinGacha()">✨ จุ่มการ์ด ✨</button>
            </div>

            <div class="gacha-chute-container">
                <div class="gacha-slot"></div>
                <div class="dropped-card" id="dropped-card"></div>
                <div class="gacha-chute-lip"></div>
            </div>
        </div>
    </div>

    <div id="manual-mode-container" class="mode-container hidden">
        <h2 class="manual-title">โปรดเลือกการ์ด 1 ใบ</h2>
        <div class="mystery-cards" id="mystery-cards-container"></div>
        <button class="btn-shuffle" id="shuffle-btn" onclick="shuffleCards()">🔀 สับการ์ด</button>
    </div>

    <div id="sequenceModal" class="hidden">
        <div id="modalBg"></div>
        <div id="impactFrame" class="hidden"></div>
        <div id="particlesContainer"></div>
        
        <div id="openingContainer" class="flex">
            <div id="boxAnimContainer">
                <div id="boxAura" style="--aura-color: #ffb300;"></div>
                <img id="animBoxImg" src="image/card-back.png" alt="Card Back"/>
            </div>
        </div>
        
        <div id="resultContainer" class="hidden">
            <div id="multipleResults">
                </div>
            <h3 id="resultText">ชื่อรางวัล</h3>
            <button class="modal-btn" onclick="closeSequenceModal()">รับรางวัล!</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🎵 โหลดไฟล์เสียง (Audio Elements)
        // ==========================================
        const sfxClick = new Audio('audio/click.mp3');     
        const sfxDrop = new Audio('audio/drop.mp3');       
        const sfxFlip = new Audio('audio/flip.mp3');       
        const sfxReveal = new Audio('audio/reveal.mp3');   

        let deck = [
            { id: 1, name: "บวก 50 คะแนน", img: "image/50.png", rate: 30 },
            { id: 2, name: "บวก 100 คะแนน", img: "image/100.png", rate: 25 },
            { id: 3, name: "บวก 150 คะแนน", img: "image/150.png", rate: 13 },
            { id: 4, name: "เกลือ", img: "image/nothing.png", rate: 20 },
            { id: 5, name: "ลูกอม", img: "image/poppy.png", rate: 6 },
            { id: 6, name: "รางวัลใหญ่!", img: "image/reward.png", rate: 0.25 },
            { id: 7, name: "ขนม", img: "image/sweet.png", rate: 4 },
            { id: 8, name: "ปากกา", img: "image/pen.png", rate: 1 }

        ];

        let currentMode = 'gacha';

        function getRandomCard() {
            const totalRate = deck.reduce((sum, card) => sum + card.rate, 0);
            let randomValue = Math.random() * totalRate;
            for (let card of deck) {
                if (randomValue < card.rate) return card;
                randomValue -= card.rate;
            }
            return deck[0];
        }

        function switchMode(mode) {
            currentMode = mode;
            const gachaContainer = document.getElementById('gacha-mode-container');
            const manualContainer = document.getElementById('manual-mode-container');
            const gachaBtn = document.getElementById('mode-gacha-btn');
            const manualBtn = document.getElementById('mode-manual-btn');

            sfxClick.currentTime = 0; 
            sfxClick.play().catch(e => console.log("Audio play blocked by browser"));

            if (mode === 'gacha') {
                gachaContainer.classList.remove('hidden');
                manualContainer.classList.add('hidden');
                gachaBtn.classList.add('active');
                manualBtn.classList.remove('active');
            } else {
                gachaContainer.classList.add('hidden');
                manualContainer.classList.remove('hidden');
                gachaBtn.classList.remove('active');
                manualBtn.classList.add('active');
                initGame(); 
            }
        }

        function initGame() {
            const container = document.getElementById('mystery-cards-container');
            container.innerHTML = '';
            
            for (let i = 0; i < 8; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                const cardEl = document.createElement('div');
                cardEl.className = 'tarot-card'; 
                cardEl.innerHTML = `
                    <div class="card-face card-front"></div>
                    <div class="card-face card-back">
                        <img id="reveal-img-${i}" src="" alt="Card">
                    </div>
                `;
                cardEl.onclick = () => selectCard(cardEl, i);
                wrapper.appendChild(cardEl);
                container.appendChild(wrapper);
            }
        }

        function shuffleCards() {
            sfxClick.currentTime = 0; 
            sfxClick.play().catch(e => console.log("Audio blocked"));

            const allCards = document.querySelectorAll('.tarot-card');
            const container = document.getElementById('mystery-cards-container');
            const btn = document.getElementById('shuffle-btn');

            if(allCards.length === 0) return;

            btn.disabled = true; btn.style.opacity = '0.5';

            const containerRect = container.getBoundingClientRect();
            const centerX = containerRect.left + containerRect.width / 2;
            const centerY = containerRect.top + containerRect.height / 2;

            allCards.forEach((card) => {
                card.onclick = null; 
                card.classList.remove('flipped', 'disabled-card');
                card.style.opacity = '1';
            });

            setTimeout(() => {
                allCards.forEach((card) => {
                    const rect = card.parentElement.getBoundingClientRect();
                    const cardCenterX = rect.left + rect.width / 2;
                    const cardCenterY = rect.top + rect.height / 2;
                    card.style.transition = 'transform 0.6s ease-in-out';
                    card.style.transform = `translate(${centerX - cardCenterX}px, ${centerY - cardCenterY}px) rotate(360deg) scale(0.6)`;
                    card.style.zIndex = '50';
                });

                setTimeout(() => {
                    allCards.forEach((card, i) => {
                        setTimeout(() => {
                            card.style.transition = 'transform 0.5s ease-out';
                            card.style.transform = 'translate(0px, 0px) rotate(0deg) scale(1)';
                        }, i * 50); 
                    });

                    setTimeout(() => {
                        allCards.forEach((card, i) => {
                            card.style.transform = ''; card.style.transition = ''; card.style.zIndex = '';
                            card.onclick = () => selectCard(card, i); 
                        });
                        btn.disabled = false; btn.style.opacity = '1';
                    }, (allCards.length * 50) + 500);
                }, 800); 
            }, 500); 
        }

        function selectCard(selectedElement, index) {
            const allCards = document.querySelectorAll('.tarot-card');
            allCards.forEach(card => {
                card.onclick = null; 
                if (card !== selectedElement) card.classList.add('disabled-card');
            });

            selectedElement.style.opacity = '0.5';
            const drawnCard = getRandomCard();
            
            document.getElementById(`reveal-img-${index}`).src = drawnCard.img;
            selectedElement.classList.add('flipped');

            sfxFlip.currentTime = 0; 
            sfxFlip.play().catch(e => console.log("Audio blocked"));

            // ส่งเป็น Array เพราะฟังก์ชันรองรับการสุ่มหลายใบแล้ว
            setTimeout(() => { startModalSequence([drawnCard]); }, 300);
        }

        function spinGacha() {
            const btn = document.getElementById('spin-btn');
            const machine = document.getElementById('gacha-machine');
            const droppedCard = document.getElementById('dropped-card');
            const countInput = document.getElementById('draw-count');
            const isSkip = document.getElementById('skip-animate-check').checked;

            let count = parseInt(countInput.value) || 1;
            if(count > 5) count = 5;
            if(count < 1) count = 1;

            sfxClick.currentTime = 0; 
            sfxClick.play().catch(e => console.log("Audio blocked"));

            btn.disabled = true; 
            btn.innerText = "กำลังจุ่ม...";

            // สุ่มการ์ดตามจำนวน
            let drawnCards = [];
            for(let i = 0; i < count; i++) {
                drawnCards.push(getRandomCard());
            }

            // ถ้ากดข้ามอนิเมชัน ให้ไปโชว์ผลลัพธ์ทันที
            if(isSkip) {
                startModalSequence(drawnCards);
                btn.disabled = false; 
                btn.innerText = "✨ จุ่มการ์ด ✨";
            } else {
                // อนิเมชันตู้สั่นปกติ
                machine.classList.add('anim-shake');
                setTimeout(() => {
                    machine.classList.remove('anim-shake');
                    
                    sfxDrop.currentTime = 0; 
                    sfxDrop.play().catch(e => console.log("Audio blocked"));

                    droppedCard.classList.add('anim-drop');

                    setTimeout(() => {
                        startModalSequence(drawnCards);
                        setTimeout(() => {
                            droppedCard.classList.remove('anim-drop');
                            btn.disabled = false; 
                            btn.innerText = "✨ จุ่มการ์ด ✨";
                        }, 500);
                    }, 1000);
                }, 1500);
            }
        }

        function createMagicParticles() {
            const container = document.getElementById('magic-particles');
            for(let i=0; i<30; i++) {
                let sparkle = document.createElement('div'); sparkle.className = 'sparkle';
                let size = Math.random() * 4 + 1; sparkle.style.width = size + 'px'; sparkle.style.height = size + 'px';
                sparkle.style.left = Math.random() * 100 + 'vw'; sparkle.style.animationDuration = (Math.random() * 3 + 2) + 's';
                sparkle.style.animationDelay = Math.random() * 5 + 's'; container.appendChild(sparkle);
            }
        }

        function createExplosionParticles() {
            const container = document.getElementById('particlesContainer'); container.innerHTML = '';
            const cx = window.innerWidth / 2; const cy = window.innerHeight / 2; const color = '#ffb300'; 
            
            for(let i=0; i<30; i++) {
                let p = document.createElement('div'); p.className = 'particle-explosion';
                p.style.backgroundColor = Math.random() > 0.5 ? color : '#fff';
                p.style.width = p.style.height = (Math.random() * 10 + 5) + 'px';
                p.style.left = cx + 'px'; p.style.top = cy + 'px'; p.style.boxShadow = '0 0 10px ' + color;
                
                const angle = Math.random() * Math.PI * 2; const velocity = Math.random() * 250 + 100;
                p.animate([ { transform: `translate(0,0) scale(1)`, opacity: 1 }, { transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity}px) scale(0)`, opacity: 0 }
                ], { duration: 600 + Math.random()*400, easing: 'cubic-bezier(0,.9,.3,1)', fill: 'forwards' });
                container.appendChild(p);
            }

            for(let i=0; i<40; i++) {
                let line = document.createElement('div'); line.className = 'particle-line';
                line.style.backgroundColor = Math.random() > 0.3 ? color : '#fff';
                line.style.width = (Math.random() * 150 + 50) + 'px'; line.style.left = cx + 'px'; line.style.top = cy + 'px';
                
                const angle = Math.random() * 360; const distance = Math.random() * 400 + 200;
                line.animate([ { transform: `rotate(${angle}deg) translateX(50px) scaleX(0.1)`, opacity: 1 }, { transform: `rotate(${angle}deg) translateX(${distance}px) scaleX(1)`, opacity: 0 }
                ], { duration: 400 + Math.random()*300, easing: 'ease-out', fill: 'forwards' });
                container.appendChild(line);
            }
        }

        function startModalSequence(drawnCardsArray) {
            const modal = document.getElementById('sequenceModal'); 
            const openingContainer = document.getElementById('openingContainer');
            const boxAnimContainer = document.getElementById('boxAnimContainer'); 
            const boxAura = document.getElementById('boxAura');
            const impactFrame = document.getElementById('impactFrame'); 
            const resultContainer = document.getElementById('resultContainer');
            const multipleResults = document.getElementById('multipleResults');
            const isSkip = document.getElementById('skip-animate-check').checked;
            
            modal.classList.remove('hidden'); modal.classList.add('flex');
            
            // ล้างหน้าการ์ดเดิมออกก่อน
            multipleResults.innerHTML = '';
            multipleResults.classList.remove('anim-burst');
            boxAnimContainer.classList.remove('anim-shake');
            impactFrame.classList.remove('anim-impact'); impactFrame.classList.add('hidden');
            document.getElementById('particlesContainer').innerHTML = '';

            // ถ้านักเรียนกดปุ่ม Skip ให้ข้ามไปแสดงการ์ดรางวัลทันที
            if (isSkip) {
                openingContainer.classList.remove('flex'); openingContainer.classList.add('hidden');
                
                let names = [];
                drawnCardsArray.forEach(card => {
                    names.push(card.name);
                    let div = document.createElement('div');
                    div.className = 'result-card-item';
                    div.innerHTML = `<img src="${card.img}" alt="${card.name}">`;
                    multipleResults.appendChild(div);
                });
                
                document.getElementById('resultText').innerHTML = `คุณได้:<br>${names.join(' , ')}`;
                resultContainer.classList.remove('hidden'); resultContainer.classList.add('flex');
                
                // เล่นเสียงโชว์รางวัลทันที
                sfxReveal.currentTime = 0; 
                sfxReveal.play().catch(e => console.log("Audio blocked"));
                
                void multipleResults.offsetWidth; multipleResults.classList.add('anim-burst');
                
            } else {
                // ถ้าไม่ได้กด Skip ให้เล่นอนิเมชันเปิดกล่องตามปกติ
                openingContainer.classList.remove('hidden'); openingContainer.classList.add('flex');
                resultContainer.classList.remove('flex'); resultContainer.classList.add('hidden');
                
                boxAura.style.opacity = '1'; boxAura.style.animation = 'aura-pulse 1.5s infinite alternate';
                void boxAnimContainer.offsetWidth; boxAnimContainer.classList.add('anim-shake');

                // จังหวะที่ออร่าพุ่งและจอขาวสว่างวาบ 
                setTimeout(() => {
                    sfxReveal.currentTime = 0; 
                    sfxReveal.play().catch(e => console.log("Audio blocked"));

                    impactFrame.classList.remove('hidden'); void impactFrame.offsetWidth; impactFrame.classList.add('anim-impact');
                    createExplosionParticles(); boxAnimContainer.style.opacity = '0'; boxAura.style.animation = 'none';
                }, 1400); 

                // จังหวะโชว์การ์ดรางวัล
                setTimeout(() => {
                    impactFrame.classList.add('hidden'); openingContainer.classList.remove('flex'); openingContainer.classList.add('hidden');
                    boxAnimContainer.style.opacity = '1'; 
                    
                    let names = [];
                    drawnCardsArray.forEach(card => {
                        names.push(card.name);
                        let div = document.createElement('div');
                        div.className = 'result-card-item';
                        div.innerHTML = `<img src="${card.img}" alt="${card.name}">`;
                        multipleResults.appendChild(div);
                    });
                    
                    document.getElementById('resultText').innerHTML = `คุณได้:<br>${names.join(' , ')}`;

                    resultContainer.classList.remove('hidden'); resultContainer.classList.add('flex');
                    void multipleResults.offsetWidth; multipleResults.classList.add('anim-burst');
                }, 1700);
            }
        }

        function closeSequenceModal() {
            sfxClick.currentTime = 0; 
            sfxClick.play().catch(e => console.log("Audio blocked"));

            const modal = document.getElementById('sequenceModal'); modal.classList.remove('flex'); modal.classList.add('hidden');
            if (currentMode === 'manual') { setTimeout(() => { shuffleCards(); }, 300); }
        }

        createMagicParticles();
    </script>
</body>
</html>
